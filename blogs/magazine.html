<style>
  
:root {
    --bg-paper: #fcfbfa;
    --text-dark: #1a1a1a;
}

body {
    font-family: 'Inter', sans-serif;
    max-height:100vh !important;
    max-width:100vw !important;
   /* background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);*/
    background:black;
    color: #fff;
    overflow-x: hidden;
    overscroll-behavior-y: auto; /* Prevents pull-to-refresh on mobile */
}

.font-playfair {
    font-family: 'Playfair Display', serif;
}

/* 1. FLUID WRAPPER: Responsive sizing for all devices */
.flip-book-wrapper {
    width: 100%;
    /* Scales between mobile width and a max desktop size */
    max-width: clamp(320px, 90vw, 1000px); 
    margin: 0 auto;
    perspective: 2000px; /* Deepened perspective for premium 3D feel */
    background-color: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
}




/* 2. PAGES: A4 aspect ratio with refined shadows */
/* 2. PAGES: A4 aspect ratio with refined shadows */
.page-content {
    width: 100%;
    height: 100%;
    background-color: var(--bg-paper);
    position: relative;
    box-sizing: border-box;
    overflow: hidden;
    color: var(--text-dark);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.05);

    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;

    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}
/* Spine overlay above image */
/* Spine overlay above image */

.spine-right .page-content::before{
    position:absolute;
    inset:0;
    z-index:2;
    pointer-events:none;

    background:
    linear-gradient(
        to right,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0.08) 5%,
        rgba(255,255,255,0.05) 8%,
        transparent 15%
    );
}

.spine-left .page-content::before{;
    position:absolute;
    inset:0;
    z-index:2;
    pointer-events:none;

    background:
    linear-gradient(
        to left,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0.08) 5%,
        rgba(255,255,255,0.05) 8%,
        transparent 15%
    );
}
/* Disable spine effect on cover pages */

.dummy-cover::before{
    display:none !important;
}

/* 3. PREMIUM IMAGES: Edge-to-edge coverage */
/* 3. PREMIUM IMAGES: Edge-to-edge coverage */

.page-content img,
.img-placeholder {
    width:100%;
    height:100%;
    object-fit:cover;

    display:block;
    pointer-events:none;
    -webkit-user-drag:none;

    transform:translateZ(0);
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;

    image-rendering:auto;
}
/* 4. REFINED SPINE GRADIENTS (3D Crease Effect) */




/* 5. INVISIBLE COVER SUPPORT */
.dummy-cover {
    background: black !important;
    box-shadow: none !important;
    border: none !important;
}

/* 6. SMOOTH TRANSFORM WRAPPER: Hardware accelerated */
#transform-wrapper {
    /* translate3d forces GPU acceleration for buttery smooth panning/zooming */
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    will-change: transform;
    transform-origin: center center;
    max-height:100vh;
    max-width: 100vw;
}
#transform-wrapper.is-dragging {
    transition: none; /* Instant feedback while dragging */
}

/* Subtle pulse for the ambient light */
@keyframes ambientPulse {
    0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
}
.ambient-light {
    animation: ambientPulse 8s ease-in-out infinite;
}

</style>
</head>

            <div class="flex items-center gap-4 md:gap-6 bg-white/10 backdrop-blur-xl px-6 py-2.5 rounded-full border border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.3)]">

                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>

                </button>

                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                </button>
                <button id="btn-zoom-in" class="text-white/70 hover:text-white transition-all p-2 rounded-full hover:bg-white/20 active:scale-90" title="Zoom In">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                </button>
            </div>
            <p id="instruction-text" class="text-white/50 text-[10px] md:text-xs font-inter uppercase tracking-[0.2em] transition-colors duration-300">Drag corners to flip or use arrows</p>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // 1. Initialize Flipbook with responsive boundaries
            const bookContainer = document.getElementById('book');
            const pageFlip = new St.PageFlip(bookContainer, {
    width:452,
    height:636,

    size:"stretch",

    minWidth:280,
    maxWidth:900,

    minHeight:400,
    maxHeight:1200,

    maxShadowOpacity:0.05,

    showCover:false,
    mobileScrollSupport:false,
    usePortrait:true
});

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            // 2. Audio Setup
            // 2. Real Page Flip Audio
// 2. Instant Real Page Flip Audio

let pageSound = null;

function initAudio() {
    if (pageSound) return;

    pageSound = new Audio("Magazine/page-flip-4.mp3");
    pageSound.preload = "auto";
    pageSound.load();

    pageSound.volume = 0.5;

    // Unlock audio on first interaction
    pageSound.play()
        .then(() => {
            pageSound.pause();
            pageSound.currentTime = 0;
        })
        .catch(() => {});
}

document.addEventListener("click", initAudio, { once:true });
document.addEventListener("touchstart", initAudio, { once:true });

function playTurnSound() {
    if (!pageSound) return;

    // create a fresh instance for instant playback
    const s = pageSound.cloneNode();

    s.volume = 0.5;

    s.play().catch(()=>{});
}



            // 3. UI Interactions & Event Listeners
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            const pageCurrentDisplay = document.getElementById('page-current');
            
            // Calculate total excluding cover and back cover if they are blanks
            document.getElementById('page-total').textContent = document.querySelectorAll('.page').length - 2;

            btnPrev.addEventListener('click', () => { if(currentScale === 1) pageFlip.flipPrev(); });
            btnNext.addEventListener('click', () => { if(currentScale === 1) pageFlip.flipNext(); });

            pageFlip.on('flip', (e) => {
                pageCurrentDisplay.textContent = e.data; // Adjusted for cover logic
                playTurnSound();
            });

            document.addEventListener('keydown', (e) => {
                if (currentScale > 1) return; 
                if (e.key === 'ArrowLeft') pageFlip.flipPrev();
                else if (e.key === 'ArrowRight') pageFlip.flipNext();
            });

            // ==========================================
            // 4. ZOOM & PAN IMPLEMENTATION (HARDWARE ACCELERATED)
            // ==========================================
            
            const transformWrapper = document.getElementById('transform-wrapper');
            const panOverlay = document.getElementById('pan-overlay');
            const instructionText = document.getElementById('instruction-text');
            
            const btnZoomIn = document.getElementById('btn-zoom-in');
            const btnZoomOut = document.getElementById('btn-zoom-out');
            const btnZoomReset = document.getElementById('btn-zoom-reset');

            let currentScale = 1;
            const maxScale = 5;
            const minScale = 1;
            const scaleStep = 0.5;

            let isDragging = false;
            let startX = 0, startY = 0;
            let panX = 0, panY = 0;

            function updateZoom() {
                if (currentScale <= 1) {
                    currentScale = 1;
                    panX = 0;
                    panY = 0;
                }

                // translate3d engages the GPU for much smoother performance on mobile and desktop
                transformWrapper.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${currentScale})`;

                if (currentScale > 1) {
                    if (panOverlay) {
                        panOverlay.classList.remove('hidden');
                        // z-index removed to fix button freezing
                    }
                    if (btnZoomReset) btnZoomReset.classList.remove('hidden');
                    
                    if (btnPrev) btnPrev.classList.add('opacity-30', 'cursor-not-allowed', 'pointer-events-none');
                    if (btnNext) btnNext.classList.add('opacity-30', 'cursor-not-allowed', 'pointer-events-none');
                    
                    if (instructionText) {
                        instructionText.textContent = "Zoom Mode Active • Drag to Pan";
                        instructionText.classList.replace('text-white/50', 'text-amber-400');
                    }
                } else {
                    if (panOverlay) panOverlay.classList.add('hidden');
                    if (btnZoomReset) btnZoomReset.classList.add('hidden');
                    
                    if (btnPrev) btnPrev.classList.remove('opacity-30', 'cursor-not-allowed', 'pointer-events-none');
                    if (btnNext) btnNext.classList.remove('opacity-30', 'cursor-not-allowed', 'pointer-events-none');
                    
                    if (instructionText) {
                        instructionText.textContent = "Drag corners to flip or use arrows";
                        instructionText.classList.replace('text-amber-400', 'text-white/50');
                    }
                }
            }

            if (btnZoomIn) {
                btnZoomIn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (currentScale < maxScale) { currentScale += scaleStep; updateZoom(); }
                });
            }

            if (btnZoomOut) {
                btnZoomOut.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (currentScale > minScale) { currentScale -= scaleStep; updateZoom(); }
                });
            }

            if (btnZoomReset) {
                btnZoomReset.addEventListener('click', (e) => {
                    e.stopPropagation();
                    currentScale = 1; updateZoom();
                });
            }

            // Panning Logic with hardware acceleration
            function startPan(clientX, clientY) {
                if (currentScale <= 1) return; 
                isDragging = true;
                startX = clientX - panX;
                startY = clientY - panY;
                if (panOverlay) panOverlay.style.cursor = 'grabbing';
                transformWrapper.classList.add('is-dragging'); 
            }

            function doPan(clientX, clientY, e) {
                if (!isDragging) return;
                if (e) e.preventDefault(); 
                
                let targetX = clientX - startX;
                let targetY = clientY - startY;

                // Better boundary calculation based on current viewport to prevent dragging the book off screen
                const boundaryX = (window.innerWidth * currentScale) / 2.5;
                const boundaryY = (window.innerHeight * currentScale) / 2.5;

                panX = Math.max(-boundaryX, Math.min(boundaryX, targetX));
                panY = Math.max(-boundaryY, Math.min(boundaryY, targetY));

                // Use requestAnimationFrame for panning if you want maximum smoothness, or rely on CSS translate3d
                transformWrapper.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${currentScale})`;
            }

            function endPan() {
                if (isDragging) {
                    isDragging = false;
                    if (panOverlay) panOverlay.style.cursor = 'grab';
                    transformWrapper.classList.remove('is-dragging'); 
                }
            }

            // Mouse Events
            if (panOverlay) panOverlay.addEventListener('mousedown', (e) => startPan(e.clientX, e.clientY));
            window.addEventListener('mousemove', (e) => doPan(e.clientX, e.clientY, e));
            window.addEventListener('mouseup', endPan);

            // Touch Events
            if (panOverlay) {
                panOverlay.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 1) startPan(e.touches[0].clientX, e.touches[0].clientY);
                }, { passive: false });
            }
            window.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && isDragging) doPan(e.touches[0].clientX, e.touches[0].clientY, e);
            }, { passive: false });
            window.addEventListener('touchend', endPan);
        });
    </script>
